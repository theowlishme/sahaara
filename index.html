<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAHAARA</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="card" id="screen">
    <h1>Welcome to SAHAARA</h1>
    <p>Select your language</p>

    <button class="btn secondary" onclick="goToLogin()">🇬🇧 English</button>
    <button class="btn secondary" onclick="goToLogin()">🇮🇳 हिन्दी</button>
    <button class="btn secondary" onclick="goToLogin()">🇮🇳 മലയാളം</button>
  </div>

  <!-- Chat Button -->
  <button class="chat-btn" onclick="toggleChat()">💬</button>

  <!-- Chat Box -->
  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      SAHAARA Assistant
      <span onclick="toggleChat()">✖</span>
    </div>

    <div class="chat-messages" id="chatMessages">
      <p><b>Assistant:</b> Hello! How can I help you?</p>
    </div>

    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Type your question...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
